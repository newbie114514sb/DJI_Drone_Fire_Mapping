# DJI Mini 4 Pro Hyperlapse Fire Mapping Configuration

drone:
  model: "DJI Mini 4 Pro"
  max_altitude_m: 2500        # Regulatory limit
  survey_altitude_m: 50       # Recommended for fire mapping
  gimbal_pitch: -90           # Point straight down (nadir)
  
hyperlapse:
  enabled: true
  interval_seconds: 3         # Frame interval (2-5 recommended)
  target_resolution: "4K"     # 4096x2160

camera:
  image_width_px: 4032
  image_height_px: 3024
  horizontal_fov_deg: 82.1
  vertical_fov_deg: 66.2

# Not applicable - Mini 4 Pro doesn't support onboard SDK
# flight_speed_mps: 5
# battery_threshold: 20
# real_time_processing: false

detection:
  algorithm: "yolov8"  # Future: fire detection model
  model_path: "models/fire_detector.pt"  # Not yet implemented
  confidence_threshold: 0.75
  detection_enabled: false  # TODO: Implement fire detection

telemetry:
  extract_gps: true
  extract_gimbal: true
  extract_timestamp: true
  
visualization:
  create_trajectory_map: true
  create_altitude_profile: true
  minimap_zoom: 16
  trajectory_offset_east_m: -10.0   # visualization-only path correction; west is negative
  trajectory_offset_north_m: 0.0    # visualization-only path correction; north is positive

geolocation:
  bbox_anchor_x: 0.5        # 0 = left edge, 1 = right edge of detection box
  bbox_anchor_y: 0.92       # near the bottom of vehicles so map points land on the road
  heading_offset_deg: 0.0   # tune if map points are consistently rotated left/right
  elevation_offset_deg: 0.0 # tune if projected points are consistently too near/far
  roll_offset_deg: 0.0      # tune residual bank/roll calibration bias
  
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  outputs: "data/outputs"
  models: "models"

